name: Repository Validation

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Validate Markdown Files
        run: |
          echo "Checking markdown files format..."
          find . -name "*.md" -type f | xargs -I {} bash -c 'echo "Validating {}"; head -n 1 "{}"'

      - name: Validate SQL Files Presence
        run: |
          echo "Checking SQL files..."
          sql_files=$(find sql/ -name "*.sql" -type f | wc -l)
          echo "Found $sql_files SQL files."

      - name: Verify Directory Structures
        run: |
          echo "Verifying required directories..."
          directories=("docs" "sql" "dbt" "terraform" "monitoring" "governance" "prompts" "roadmap")
          for dir in "${directories[@]}"; do
            if [ -d "$dir" ]; then
              echo "✅ Directory '$dir' exists."
            else
              echo "❌ Directory '$dir' is missing!"
              exit 1
            fi
          done
